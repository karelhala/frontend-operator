---
apiVersion: cloud.redhat.com/v1alpha1
kind: FrontendEnvironment
metadata:
  name: test-pushcache-min-assets
spec:
  generateNavJSON: false
  ssl: false
  hostname: foo.redhat.com
  sso: https://sso.foo.redhat.com
  overwriteCaddyConfig: true
  enablePushCache: true
  valpopImage: quay.io/redhat-user-workloads/hcc-platex-services-tenant/valpop:9843de0
  minAssetRecords: 10
---
apiVersion: cloud.redhat.com/v1alpha1
kind: Frontend
metadata:
  name: chrome-test-min-assets
  namespace: test-pushcache-min-assets
spec:
  API:
    versions:
      - v1
  frontend:
    paths:
      - /chrome/min-assets
  deploymentRepo: https://github.com/RedHatInsights/insights-chrome
  envName: test-pushcache-min-assets
  image: quay.io/cloudservices/insights-chrome-frontend:720317c
  module:
    config:
      ssoUrl: 'https://'
    manifestLocation: /apps/chrome/js/fed-mods.json
  title: Chrome
