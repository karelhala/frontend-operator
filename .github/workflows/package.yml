---
name: Run Unit Tests

'on':
  - pull_request

jobs:

  testing:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/setup-go@v6
        name: Set up golang 1.26
        with:
          go-version: '1.26.3'
      - name: Check out source code
        uses: actions/checkout@v6
      - name: Install package and dependencies
        run: |
          make
      - name: Run Tests
        run: make test
